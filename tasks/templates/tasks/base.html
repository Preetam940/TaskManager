{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Task Manager</title>
    <link rel="stylesheet" href="{% static 'tasks/css/style.css' %}">
    <link rel="stylesheet" href= "{% static 'tasks/css/messages.css' %}">
    {% block css %}{% endblock css %}

</head>
<body>

{% include "tasks/components/navbar.html" %}

{% if messages %}
   {% for message in messages %}
        <div class="message {{ message.tags }}">
            {{ message }}
        </div>
   {% endfor %}
{% endif %}

{% block content %}
{% endblock %}

</body>
</html>
